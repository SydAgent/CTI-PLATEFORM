# ============================================================================
# ONYX CTI — Privoxy Configuration
# HTTP-to-SOCKS5 bridge: converts HTTP requests to Tor SOCKS5.
# ============================================================================

# Listen on all interfaces for HTTP proxy requests
listen-address  0.0.0.0:8118

# Forward all traffic through Tor SOCKS5
forward-socks5t / 127.0.0.1:9050 .

# Disable logging for privacy
logdir /var/log/privoxy
logfile logfile

# Strip identifying headers
toggle 1
enable-remote-toggle 0
enable-remote-http-toggle 0
enable-edit-actions 0

# Aggressive header scrubbing
actionsfile match-all.action
actionsfile default.action

# Connection tuning
keep-alive-timeout 5
tolerate-pipelining 1
socket-timeout 120
