      - "whaling"
      - "smishing"
      - "vishing"
      - "infostealer"
      - "stealer"
      - "trojan"
      - "worm"
      - "rootkit"
      - "keylogger"
      - "backdoor"
      - "dropper"
      - "loader"
      - "cobalt strike"
      - "beacon"
      - "meterpreter"
      - "mimikatz"
      - "ip"
      - "firewall"
      - "edr"
      - "xdr"
      - "ndr"
      - "sandbox"
      - "detonation"
      - "forensic"
      - "incident"
      - "response"
      - "hunting"
      - "detection"
      - "rule"
      - "alert"
      - "report"
      - "brief"
      - "status"
      - "analyse"
      - "analyze"
      - "scan"
      - "block"
      - "isolate"
      - "quarantine"
      - "contain"
      - "investigate"
