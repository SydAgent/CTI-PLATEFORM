# ============================================================================
# ONYX CTI — LLM Security Guardrails Configuration
# NeMo-Guardrails inspired declarative policy engine.
# ============================================================================

guardrails:
  # ── Input Validation ─────────────────────────────────────────────────────
  input:
    max_length: 4000

    # Prompt injection canonical patterns (case-insensitive regex)
    prompt_injection_patterns:
      - "ignore (all |any )?previous (instructions|prompts|rules|directives)"
      - "disregard (all |any )?prior"
      - "you are now (?!analyzing|scanning)"
      - "new (role|instructions|identity|persona):"
      - "override (your |the )?system"
      - "\\bsystem\\s*:\\s*"
      - "\\[INST\\]"
      - "### (Instruction|System|Human):"
      - "<\\|im_start\\|>"
      - "<<SYS>>"
      - "forget (everything|all|your)"
      - "pretend (you are|to be|you're)"
      - "act as (if |though )?(you are|you're)"
      - "from now on,? (you|your)"
      - "do not follow"
      - "bypass (your |the |all )?(?:restrictions|filters|rules|safety)"

    # Jailbreak / adversarial patterns
    jailbreak_patterns:
      - "\\bDAN\\b"
      - "Do Anything Now"
      - "\\bAIM\\b.*mode"
      - "opposite mode"
      - "developer mode"
      - "jailbreak"
      - "unrestricted mode"
      - "unfiltered mode"
      - "god mode"
      - "sudo mode"
      - "admin override"
      - "evil mode"
      - "maximum mode"

    # Offensive / weapon-building topics (absolute block)
    blocked_topics:
      - "write (me |an? )?exploit"
      - "how to hack"
      - "generate (a |the )?payload"
      - "reverse shell"
      - "bypass (the |an? )?antivirus"
      - "create (a |the )?malware"
      - "build (a |the )?trojan"
      - "craft (a |the )?phishing"
      - "how to (ddos|dos)"
      - "write (a |the )?worm"
      - "code (a |the )?keylogger"
      - "create (a |the )?ransomware"
      - "build (a |the )?botnet"
      - "deploy (a |the )?rootkit"

    # CTI domain keywords (at least one must match for long queries)
    cti_scope_keywords:
      - "ransomware"
      - "lockbit"
      - "blackcat"
      - "alphv"
      - "clop"
      - "phishing"
      - "ioc"
      - "indicator"
      - "hash"
      - "domain"
      - "url"
      - "cve"
      - "vulnerability"
      - "exploit"
      - "dark web"
      - "deep web"
      - "tor"
      - "onion"
      - "leak"
      - "breach"
      - "pastebin"
      - "credentials"
      - "malware"
      - "botnet"
      - "ddos"
      - "apt"
      - "threat"
      - "actor"
      - "attack"
      - "campaign"
      - "remediation"
      - "mitigation"
      - "soc"
      - "siem"
      - "mitre"
      - "att&ck"
      - "sigma"
      - "yara"
      - "snort"
      - "suricata"
      - "osint"
      - "intelligence"
      - "c2"
      - "command and control"
      - "exfiltration"
