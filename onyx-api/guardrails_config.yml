    # Minimum word count before enforcing scope check
    scope_check_min_words: 8

  # ── Output Validation ────────────────────────────────────────────────────
  output:
    max_length: 16000

    # PII/credential leakage patterns (if detected in LLM output)
    pii_patterns:
      - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,7}\\b"
      - "\\b\\d{3}[- ]?\\d{2}[- ]?\\d{4}\\b"
      - "\\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13})\\b"

    credential_patterns:
      - "(?:password|passwd|pwd)\\s*[:=]\\s*['\"]?\\S{6,}"
      - "(?:api[_-]?key|apikey)\\s*[:=]\\s*['\"]?\\S{10,}"
      - "(?:secret|token)\\s*[:=]\\s*['\"]?\\S{10,}"
      - "(?:AIza[0-9A-Za-z_-]{35})"
      - "(?:sk-[A-Za-z0-9]{32,})"

    # Toxic / harmful content markers
    toxic_patterns:
      - "how to (murder|kill|harm|poison)"
      - "instructions (for|to) (build|make|create) (a |the )?(bomb|weapon|explosive)"
