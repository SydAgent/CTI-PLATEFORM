name: onyx-cti-platform

services:
  redis:
    image: redis:7-alpine
    container_name: onyx_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-onyx_redis_secret_2026}
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - onyx_secure_backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-onyx_redis_secret_2026}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: onyx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onyx_cti
      POSTGRES_USER: ${POSTGRES_USER:-onyx_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onyx_pg_secret_2026}
    expose:
      - "5432"
    networks:
      - onyx_secure_backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onyx_admin} -d onyx_cti"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: onyx_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-onyx_graph_secret_2026}
    expose:
      - "7687"
      - "7474"
    networks:
      - onyx_secure_backend
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: onyx_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ONYX_ENV=production
      - ONYX_DEBUG=true
      - STANDALONE_MODE=true
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-onyx_redis_secret_2026}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-onyx_admin}:${POSTGRES_PASSWORD:-onyx_pg_secret_2026}@postgres:5432/onyx_cti
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-onyx_graph_secret_2026}
      - OSINT_ALIENVAULT_OTX_KEY=${OSINT_ALIENVAULT_OTX_KEY:-}
      # Additional environment configurations inherited from .env
    env_file:
      - .env
    networks:
      - onyx_secure_backend
      - onyx_frontend_bridge
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./onyx-dashboard
      dockerfile: Dockerfile.frontend
    container_name: onyx_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    networks:
      - onyx_frontend_bridge
    depends_on:
      - backend

networks:
  onyx_secure_backend:
    internal: true
    name: onyx_secure_backend
  onyx_frontend_bridge:
    name: onyx_frontend_bridge

volumes:
  postgres_data:
  neo4j_data:
