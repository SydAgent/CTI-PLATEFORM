name: onyx-cti-platform

services:
  redis:
    image: redis:7-alpine
    container_name: onyx_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-onyx_redis_secret_2026}
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - onyx_secure_backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-onyx_redis_secret_2026}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: onyx_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ONYX_ENV=production
      - ONYX_DEBUG=true
      - STANDALONE_MODE=true
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-onyx_redis_secret_2026}
      - OSINT_ALIENVAULT_OTX_KEY=${OSINT_ALIENVAULT_OTX_KEY:-}
      # Additional environment configurations inherited from .env
    env_file:
      - .env
    networks:
      - onyx_secure_backend
      - onyx_frontend_bridge
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./onyx-dashboard
      dockerfile: Dockerfile.frontend
    container_name: onyx_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    networks:
      - onyx_frontend_bridge
    depends_on:
      - backend

networks:
  onyx_secure_backend:
    internal: true
    name: onyx_secure_backend
  onyx_frontend_bridge:
    name: onyx_frontend_bridge
