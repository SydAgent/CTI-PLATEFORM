# ============================================================================
# ONYX CTI PLATFORM — Docker Compose Production Stack
# Codename: ONYX v3.0-GENESIS
# All services are production-hardened: non-root users, health checks,
# resource limits, restart policies, and network micro-segmentation.
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # DATA LAYER
  # --------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: onyx-elasticsearch
    hostname: elasticsearch
    environment:
      - node.name=onyx-es-node-1
      - cluster.name=onyx-cti-cluster
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
      - action.destructive_requires_name=true
      - indices.query.bool.max_clause_count=4096
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./infra/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      - onyx-data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTICSEARCH_PASSWORD} http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  mongodb:
    image: mongo:7.0
    container_name: onyx-mongodb
    hostname: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    volumes:
      - mongo_data:/data/db
      - ./infra/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/01-init-mongo.js:ro
    ports:
      - "27017:27017"
    networks:
      - onyx-data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGODB_USER}", "-p", "${MONGODB_PASSWORD}", "--authenticationDatabase", "admin", "--quiet"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: onyx-redis
    hostname: redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --timeout 300
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - onyx-data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # --------------------------------------------------------------------------
  # INFRASTRUCTURE LAYER
  # --------------------------------------------------------------------------
  tor-proxy:
    build:
      context: ./infra/tor
      dockerfile: Dockerfile
    container_name: onyx-tor-proxy
    hostname: tor-proxy
    environment:
      TOR_CONTROL_PASSWORD: ${TOR_CONTROL_PASSWORD}
      TOR_CIRCUIT_ROTATION_SECONDS: ${TOR_CIRCUIT_ROTATION_SECONDS}
      TOR_MAX_CIRCUITS: ${TOR_MAX_CIRCUITS}
    ports:
      - "9050:9050"
      - "8118:8118"
    networks:
      - onyx-edge
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # --------------------------------------------------------------------------
  # APPLICATION LAYER
  # --------------------------------------------------------------------------
  onyx-api:
    build:
      context: .
      dockerfile: ./onyx-api/Dockerfile
    container_name: onyx-api
    hostname: onyx-api
    user: root
    env_file: .env
    volumes:
      - ./onyx-api:/app/onyx-api
      - ./onyx-core:/app/onyx-core
      - ./onyx-nlp:/app/onyx-nlp
    ports:
      - "8000:8000"
    networks:
      - onyx-data
      - onyx-app
    command: >
      sh -c "pip install google-genai qdrant-client strawberry-graphql && uvicorn onyx_api.main:app --host 0.0.0.0 --port 8000 --workers 4"
    depends_on:
      elasticsearch:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  onyx-workers:
    build:
      context: .
      dockerfile: ./onyx-api/Dockerfile
    container_name: onyx-workers
    hostname: onyx-workers
    command: ["celery", "-A", "onyx_api.services.celery_app:celery", "worker", "--loglevel=info", "--concurrency=${CELERY_CONCURRENCY}", "-Q", "default,crawlers,nlp,analysis"]
    env_file: .env
    networks:
      - onyx-data
      - onyx-app
      - onyx-edge
    depends_on:
      onyx-api:
        condition: service_healthy
      tor-proxy:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  onyx-scheduler:
    build:
      context: .
      dockerfile: ./onyx-api/Dockerfile
    container_name: onyx-scheduler
    hostname: onyx-scheduler
    command: ["celery", "-A", "onyx_api.services.celery_app:celery", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    env_file: .env
    networks:
      - onyx-data
      - onyx-app
    depends_on:
      onyx-api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  onyx-dashboard:
    build:
      context: ./onyx-dashboard
      dockerfile: Dockerfile
    container_name: onyx-dashboard
    hostname: onyx-dashboard
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL}
    ports:
      - "3000:3000"
    networks:
      - onyx-app
    depends_on:
      onyx-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

# --------------------------------------------------------------------------
# NETWORKS — Micro-segmentation
# --------------------------------------------------------------------------
networks:
  onyx-data:
    driver: bridge
    name: onyx-data
    # Data tier: ES, Mongo, Redis ↔ API only
  onyx-app:
    driver: bridge
    name: onyx-app
    # App tier: API ↔ Dashboard
  onyx-edge:
    driver: bridge
    name: onyx-edge
    # Edge tier: Crawlers ↔ Tor proxy only

# --------------------------------------------------------------------------
# VOLUMES — Persistent storage
# --------------------------------------------------------------------------
volumes:
  es_data:
    driver: local
    name: onyx-es-data
  mongo_data:
    driver: local
    name: onyx-mongo-data
  redis_data:
    driver: local
    name: onyx-redis-data
